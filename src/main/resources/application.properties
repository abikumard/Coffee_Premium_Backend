spring.application.name=coffee-reservation

server.port=${PORT:8080}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000

admin.default.email=${ADMIN_EMAIL:admin@roasthouse.com}
admin.default.password=${ADMIN_PASSWORD:Admin@123}

otp.expiry.minutes=5
auth.token.expiry.hours=12

logging.level.com.abikumar.coffee_reservation=INFO 
logging.level.org.springframework.jdbc.core=WARN